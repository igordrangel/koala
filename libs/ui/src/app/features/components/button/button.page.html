<div class="p-4">
  <h1>Button</h1>
  <small>Button component</small>
  <span class="divider"></span>

  <h2 class="pb-3">Variants</h2>
  <div class="flex gap-2 items-center">
    <button appButton variant="primary">Primary</button>
    <button appButton variant="secondary">Secondary</button>
    <button appButton variant="error">Danger</button>
    <button appButton variant="success">Success</button>
    <button appButton variant="warning">Warning</button>
    <button appButton variant="info">Info</button>
    <button appButton variant="neutral">Neutral</button>
    <button appButton variant="ghost">Ghost</button>
  </div>

  <h2 class="pt-5">Sizes</h2>
  <div class="flex gap-2 items-center">
    <button appButton size="xs">Extra Small</button>
    <button appButton size="sm">Small</button>
    <button appButton size="md">Medium</button>
    <button appButton size="lg">Large</button>
    <button appButton size="xl">Extra Large</button>
  </div>

  <h2 class="py-5">Outline</h2>
  <div class="flex gap-2 items-center">
    <button appButton outline variant="primary">Primary</button>
    <button appButton outline variant="secondary">Secondary</button>
    <button appButton outline variant="error">Danger</button>
    <button appButton outline variant="success">Success</button>
    <button appButton outline variant="warning">Warning</button>
    <button appButton outline variant="info">Info</button>
    <button appButton outline variant="neutral">Neutral</button>
    <button appButton outline variant="ghost">Ghost</button>
  </div>

  <h2 class="py-5">Soft</h2>
  <div class="flex gap-2 items-center">
    <button appButton soft variant="primary">Primary</button>
    <button appButton soft variant="secondary">Secondary</button>
    <button appButton soft variant="error">Danger</button>
    <button appButton soft variant="success">Success</button>
    <button appButton soft variant="warning">Warning</button>
    <button appButton soft variant="info">Info</button>
    <button appButton soft variant="neutral">Neutral</button>
    <button appButton soft variant="ghost">Ghost</button>
  </div>

  <h2 class="py-5">Dash</h2>
  <div class="flex gap-2 items-center">
    <button appButton dash variant="primary">Primary</button>
    <button appButton dash variant="secondary">Secondary</button>
    <button appButton dash variant="error">Danger</button>
    <button appButton dash variant="success">Success</button>
    <button appButton dash variant="warning">Warning</button>
    <button appButton dash variant="info">Info</button>
    <button appButton dash variant="neutral">Neutral</button>
    <button appButton dash variant="ghost">Ghost</button>
  </div>

  <h2 class="py-5">Disabled</h2>
  <div class="flex gap-2 items-center">
    <button appButton disabled variant="primary">Disabled</button>
  </div>

  <h2 class="py-5">Circle</h2>
  <div class="flex gap-2 items-center">
    <button appButton circle variant="primary">C</button>
  </div>
</div>
