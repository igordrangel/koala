<div class="flex items-center justify-between py-2 w-full bg-base-100 min-w-0">
  <div class="flex items-center shrink-0">
    <span class="flex items-center gap-3 mr-6">
      <i class="app-icon kl-logotype size-6!"></i>
      <span class="badge badge-sm badge-soft bg-neutral-800 font-semibold hidden sm:inline-flex">{{
        version
      }}</span>
    </span>

    <a
      class="opacity-60 hidden md:inline-flex"
      appButton
      btnSize="sm"
      btnVariant="ghost"
      routerLink="get-started"
      routerLinkActive="opacity-100"
    >
      Get Started
    </a>

    <a
      class="opacity-60 hidden md:inline-flex"
      appButton
      btnSize="sm"
      btnVariant="ghost"
      routerLink="components"
      routerLinkActive="opacity-100"
    >
      Components
    </a>

    <a
      class="opacity-60 hidden md:inline-flex"
      appButton
      btnSize="sm"
      btnVariant="ghost"
      routerLink="blocks"
      routerLinkActive="opacity-100"
    >
      Blocks
    </a>
  </div>

  <div class="flex items-center min-w-0">
    <a
      href="https://www.npmjs.com/package/koala-utils"
      target="_blank"
      class="relative hidden lg:inline-flex"
      appButton
      btnSize="sm"
      btnVariant="ghost"
    >
      @koalarx/utils
      <i class="fa-solid fa-arrow-up-long opacity-50 rotate-45 text-[0.6rem]"></i>
    </a>
    <a
      href="https://nest.koalarx.com"
      target="_blank"
      class="relative hidden lg:inline-flex"
      appButton
      btnSize="sm"
      btnVariant="ghost"
    >
      @koalarx/nest
      <i class="fa-solid fa-arrow-up-long opacity-50 rotate-45 text-[0.6rem]"></i>
    </a>
    <span class="ml-2 mr-1 opacity-20 hidden lg:inline">|</span>
    <button
      appButton
      btnSize="sm"
      btnVariant="ghost"
      (click)="copyLlmsUrl()"
      appTooltip="Copy docs index URL (llms.txt) to use with AI"
      tooltipPosition="bottom"
      class="relative transition-colors whitespace-nowrap"
    >
      @if (copied()) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
        <span class="text-success">Copied!</span>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
        </svg>
        <span class="sm:hidden">Copy AI</span>
        <span class="hidden sm:inline">Copy AI docs index</span>
      }
    </button>
    <app-github-stars class="w-auto" />
  </div>
</div>
