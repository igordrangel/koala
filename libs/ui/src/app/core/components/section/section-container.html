<section class="p-4">
  <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-6 gap-4">
    <div class="flex flex-col">
      <h1 class="text-4xl sm:text-5xl font-bold empty:hidden">
        <ng-content select="[title]" />
      </h1>
      <small class="text-base font-light opacity-75 empty:hidden">
        <ng-content select="[description]" />
      </small>
    </div>

    <button
      (click)="copyAiDocUrl()"
      appTooltip="Copy this component's Markdown doc URL to use with AI"
      tooltipPosition="bottom"
      class="flex items-center gap-1.5 shrink-0 self-start sm:self-auto mt-0 sm:mt-1 px-3 py-1.5 rounded-lg border border-base-300 bg-base-100 hover:bg-base-200 text-xs font-medium text-base-content/70 hover:text-base-content transition-colors cursor-pointer"
    >
      @if (copied()) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
        <span class="text-success">Copied!</span>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
        </svg>
        Copy for AI
      }
    </button>
  </div>

  <ng-content />
</section>
