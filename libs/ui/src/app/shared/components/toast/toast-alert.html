<div
  class="flex flex-col rounded-lg border-2 border-base-300 bg-base-200 cursor-pointer"
  (click)="toastRef.dismiss()"
>
  <div class="flex items-center justify-between gap-5 py-2 px-5 max-w-[30vw]">
    @switch (config.type) {
      @case ('success') {
        <i class="fa-solid fa-circle-check text-success"></i>
      }
      @case ('error') {
        <i class="fa-solid fa-circle-xmark text-error"></i>
      }
      @case ('info') {
        <i class="fa-solid fa-circle-info text-info"></i>
      }
      @case ('warning') {
        <i class="fa-solid fa-triangle-exclamation text-warning"></i>
      }
    }

    <div class="flex flex-col text-sm">
      <h3 class="text-sm font-semibold empty:hidden">{{ config.title }}</h3>
      <p>{{ config.message }}</p>
    </div>

    <button type="button" appButton btnVariant="neutral" btnSize="xs">Ok</button>
  </div>

  @if (timeout) {
    <progress
      class="progress opacity-20 h-1 rounded-t-none"
      [attr.value]="currentTimeout()"
      [attr.max]="timeout"
    ></progress>
  }
</div>
