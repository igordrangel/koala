<div
  ngCombobox
  filterMode="manual"
  class="relative block w-full"
  [attr.aria-disabled]="isDisabled()"
>
  <app-combobox-trigger
    [multiple]="multiple()"
    [selectedOptions]="selectedOptions()"
    [selectedOption]="selectedOption()"
    [placeholder]="placeholder()"
    [isDisabled]="isDisabled()"
    [isLoading]="isLoading()"
    [isOpen]="isOpen()"
    [inputValue]="inputValue()"
    (focusRequested)="handleInputFocus()"
    (inputKeydown)="handleInputKeydown($event)"
    (inputValueChange)="handleInput($event)"
    (clearSelection)="clearSelection()"
    (removeTag)="removeOption($event)"
  />

  @if (isOpen()) {
    <app-combobox-options-panel
      [isLoading]="isLoading()"
      [searchingMessage]="searchingMessage()"
      [filterValue]="filterValue()"
      [showEmptyState]="showEmptyState()"
      [emptyMessage]="emptyMessage()"
      [options]="resolvedOptions()"
      [activeIndex]="activeIndex()"
      [multiple]="multiple()"
      [selectedOption]="selectedOption()"
      [selectedOptions]="selectedOptions()"
      (selectOption)="selectOption($event)"
    />
  }
</div>
