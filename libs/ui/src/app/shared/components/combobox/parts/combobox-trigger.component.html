<div
  class="group flex min-h-10 w-full items-center rounded-lg border border-base-300 bg-base-100 pl-3 pr-10 text-sm text-base-content shadow-sm transition outline-none"
  [class.border-base-300]="!isOpen()"
  [class.ring-2]="isOpen()"
  [class.ring-base-content/10]="isOpen()"
  [class.opacity-60]="isDisabled()"
  [class.pointer-events-none]="isDisabled()"
  [class.pr-16]="hasSelection() && !isDisabled()"
  [class.py-1]="multiple()"
  [class.flex-wrap]="multiple()"
  [class.gap-1]="multiple()"
>
  @if (multiple() && selectedOptions().length > 0) {
    @for (option of selectedOptions(); track option.value) {
      <span class="badge badge-success badge-soft badge-xs h-auto gap-1 px-2 py-1">
        {{ option.label }}
        <i
          class="fa-solid fa-xmark cursor-pointer text-[10px]"
          (pointerdown)="onRemoveTag(option.value, $event)"
        ></i>
      </span>
    }
  }

  <input
    ngComboboxInput
    type="text"
    class="h-10 border-0 bg-transparent p-0 text-sm text-base-content outline-none placeholder:text-base-content/50"
    [class.w-full]="!multiple()"
    [style.flex]="multiple() ? '1 1 0' : null"
    [style.min-width]="multiple() ? '5rem' : null"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [value]="displayInputValue()"
    [attr.aria-busy]="isLoading()"
    (focus)="focusRequested.emit()"
    (click)="focusRequested.emit()"
    (keydown)="inputKeydown.emit($event)"
    (valueChange)="inputValueChange.emit($event)"
  />

  @if (isLoading()) {
    <span
      appLoading
      variant="spinner"
      size="sm"
      class="absolute right-8 text-base-content/60"
    ></span>
  } @else if (hasSelection() && !isDisabled()) {
    <button
      type="button"
      class="absolute right-8 inline-flex h-5 w-5 items-center justify-center rounded text-base-content/50 transition hover:text-base-content/80 cursor-pointer"
      aria-label="Clear selection"
      (click)="clearSelection.emit()"
    >
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  }

  <span class="pointer-events-none absolute right-3 text-base-content/50">
    <i class="fa-solid fa-chevron-down text-xs"></i>
  </span>
</div>
