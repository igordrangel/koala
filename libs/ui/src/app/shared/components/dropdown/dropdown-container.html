<button
  #dropdownTrigger
  type="button"
  class="p-0!"
  tabindex="0"
  role="button"
  [attr.popovertarget]="id"
  (click)="ajustPosition()"
>
  <ng-content select="[trigger]" />
</button>

<div
  #dropdownContent
  tabindex="0"
  popover
  [id]="id"
  class="dropdown menu p-0 bg-base-200 rounded-box mt-3 min-w-52 w-auto max-w-[30vw] max-h-[40vh] shadow-sm border-2 border-neutral-200 dark:border-neutral-800 rounded-md overflow-y-auto"
>
  <ng-content select="[options]" />
</div>
