<div
  #dropdown
  class="dropdown dropdown-close"
  [class.dropdown-top]="direction() === 'top'"
  [class.dropdown-bottom]="direction() === 'bottom'"
  [class.dropdown-left]="direction() === 'left'"
  [class.dropdown-right]="direction() === 'right'"
>
  <div tabindex="0" role="button">
    <ng-content select="[trigger]" />
  </div>
  <ul
    tabindex="-1"
    class="dropdown-content menu bg-base-100 rounded-box z-1 p-0 shadow-sm border-4 border-neutral-800"
  >
    <ng-content select="[options]" />
  </ul>
</div>
