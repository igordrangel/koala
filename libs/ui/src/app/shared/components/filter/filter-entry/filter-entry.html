@if (state.isEditing()) {
  <app-filter-entry-edit
    [definition]="definition()"
    [size]="size()"
    [chipClass]="state.chipClass()"
    [removeLabel]="state.removeLabel()"
    [resolvedPlaceholder]="state.resolvedPlaceholder()"
    [fieldWidthCh]="state.fieldWidthCh()"
    [dateFieldWidthCh]="state.dateFieldWidthCh()"
    [comboboxClass]="state.comboboxClass()"
    [resolvedOptions]="state.resolvedOptions()"
    [resolvedComboboxOptions]="state.resolvedComboboxOptions()"
    [comboboxResourceFactory]="state.comboboxResourceFactory()"
    [comboboxControl]="state.comboboxControl"
    [selectControl]="state.selectControl"
    [selectMultipleControl]="state.selectMultipleControl"
    [currencyControl]="state.currencyControl"
      [validationControl]="state.validationControl"
    [currencyConfig]="state.currencyConfig()"
    [currencyDecimalDigits]="state.currencyDecimalDigits()"
    [entryTextValue]="state.entryTextValue()"
    [inputType]="state.inputType()"
    [inputMode]="state.inputMode()"
    [inputMask]="state.inputMask()"
    (optionSelected)="state.onComboboxOptionSelected($event)"
    (dateChange)="state.onDateChange($event)"
    (textValueInput)="state.onTextChange($event)"
    (currencyInput)="state.onCurrencyInput($event)"
    (remove)="state.removeCurrent()"
    (fieldKeydown)="state.onFieldKeydown($event)"
  />
} @else {
  <app-filter-entry-view
    [definition]="definition()"
    [chipClass]="state.chipClass()"
    [displayValue]="state.displayValue()"
    [isRemoteValueLoading]="state.isRemoteValueLoading()"
    [i18n]="i18n()"
    [removeLabel]="state.removeLabel()"
    (open)="state.openEdit()"
    (remove)="state.removeCurrent()"
    (chipKeydown)="state.onChipKeydown($event)"
  />
}
