<span [class]="chipClass()" class="cursor-default">
  <button
    type="button"
    class="inline-flex min-w-0 items-center gap-1 bg-transparent p-0 text-left outline-none"
    (click)="open.emit()"
    (keydown)="chipKeydown.emit($event)"
  >
    <span class="shrink-0 opacity-60">{{ definition().label }}:</span>

    @if (displayValue()) {
      <span class="max-w-40 truncate">{{ displayValue() }}</span>
    } @else if (isRemoteValueLoading()) {
      <span class="italic opacity-40">loading...</span>
    } @else {
      <span class="italic opacity-40">{{ i18n().emptyLabel }}</span>
    }
  </button>

  <app-filter-entry-remove-button [removeLabel]="removeLabel()" (remove)="remove.emit()" />
</span>
