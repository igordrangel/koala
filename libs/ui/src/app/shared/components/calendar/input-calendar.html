<div class="relative w-full">
  <input
    #textInput
    type="text"
    appInput
    class="w-full pr-10"
    [size]="size()"
    [appMask]="inputMask()"
    [id]="id"
    [style.anchor-name]="`--${id}`"
    [value]="inputValue()"
    [placeholder]="placeholder()"
    (input)="onInputChange($event)"
    (keydown)="onInputKeydown($event)"
    (focus)="openPopover()"
    (click)="openPopover()"
  />

  @if (value()) {
    <button
      type="button"
      class="btn btn-ghost btn-xs absolute top-1/2 right-2 -translate-y-1/2 min-h-0 h-6 w-6 p-0"
      aria-label="Clear selected date"
      (click)="clear($event)"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
  }
</div>
<div
  #popover
  popover
  class="input-calendar-popover dropdown bg-base-100 rounded-box shadow-lg flex flex-col overflow-hidden"
  [class.datetime-popover]="type() === 'datetime'"
  [id]="popoverId"
  [style.position-anchor]="`--${id}`"
>
  @if (type() === 'month') {
    <app-input-calendar-month-picker
      [displayedYear]="displayedYear()"
      [value]="value()"
      [monthOptions]="monthOptions"
      (previousYear)="changeDisplayedYear(-1)"
      (nextYear)="changeDisplayedYear(1)"
      (monthSelect)="setMonthValue($event)"
    />
  } @else {
    <div class="datetime-calendar-wrapper">
      <app-calendar
        [type]="type() === 'daterange' ? 'daterange' : 'date'"
        [squareBottom]="type() === 'datetime'"
        [value]="value()"
        (selectedDate)="setDateValue($event)"
        (selectedRange)="setRangeValue($event)"
      />
    </div>
  }

  @if (type() === 'datetime') {
    <app-input-calendar-time-row [value]="timeValue()" (valueChange)="setTimeValue($event)" />
  }
</div>
