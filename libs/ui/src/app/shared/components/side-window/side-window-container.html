<div class="relative flex h-full z-1000 bg-base-200 p-4 animate-slide-in-left">
  <div class="flex flex-col w-auto max-w-full h-full bg-base-100">
    <div class="flex items-center border-b border-base-300 p-4 text-lg font-bold empty:hidden">
      <ng-content select="[title]" />
    </div>

    <div class="h-full empty:hidden">
      <ng-content select="[content]" />
    </div>

    <div class="flex items-center justify-end border-t border-base-300 p-4 empty:hidden">
      <ng-content select="[actions]" />
    </div>
  </div>
</div>
